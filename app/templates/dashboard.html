<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>
<body>

    <main class="container py-5">

        <div class="text-center mb-5">
            <h1 class="display-5 fw-bold">AI Task Manager</h1>
            <p class="text-muted">
                Manage tasks, track reports, and monitor reminder activity.
            </p>
        </div>
    
        <div class="row g-4">
    
            <div class="col-md-4">
                <div class="card shadow-sm h-100">
                    <div class="card-body text-center">
                        <h4>📋 Tasks</h4>
                        <p class="text-muted">
                            Create, edit and manage tasks.
                        </p>
                        <a href="/tasks" class="btn btn-primary">
                            Open Tasks
                        </a>
                    </div>
                </div>
            </div>
    
            <div class="col-md-4">
                <div class="card shadow-sm h-100">
                    <div class="card-body text-center">
                        <h4>📊 Reports</h4>
                        <p class="text-muted">
                            View task completion reports.
                        </p>
                        <a href="/reports" class="btn btn-info">
                            View Reports
                        </a>
                    </div>
                </div>
            </div>
    
            <div class="col-md-4">
                <div class="card shadow-sm h-100">
                    <div class="card-body text-center">
                        <h4>🔔 Reminders</h4>
                        <p class="text-muted">
                            Check reminder logs and notifications.
                        </p>
                        <a href="/reminders" class="btn btn-dark">
                            View Logs
                        </a>
                    </div>
                </div>
            </div>
    
        </div>
    
    </main>
</body>
</html>
